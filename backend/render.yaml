services:
  - type: web
    name: fintech-onboarding-backend
    env: python
    pythonVersion: 3.14.3
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    autoDeploy: true
    envVars:
      - key: SECRET_KEY
      - key: APP_HOST
        value: "0.0.0.0"
      - key: APP_PORT
        value: "8000"
      - key: APP_RELOAD
        value: "false"
      - key: CARGO_HOME
        value: "/tmp/cargo"
      - key: CARGO_TARGET_DIR
        value: "/tmp/cargo-target"
